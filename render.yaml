services:
  - type: web
    name: noori-backend
    runtime: node
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npx prisma migrate deploy && node dist/src/main
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    name: noori-web
    runtime: node
    buildCommand: cd web && npm install && npm run build && cp -r web/.next/static web/.next/standalone/.next/static && cp -r web/public web/.next/standalone/public
    startCommand: node web/.next/standalone/server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_API_URL
        value: https://noori-backend.onrender.com/api
